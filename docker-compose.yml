version: '3.8'

services:
  api-template:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-template-f78c-28helennelson:latest
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DATABASE_URL=sqlite:///data/app.db?_busy_timeout=5000
      - LOG_LEVEL=debug
    volumes:
      - ./data:/app/data
      - ./config/config.yaml:/app/config/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: SQLite browser for debugging (uncomment to enable)
  # sqlite-browser:
  #   image: ghcr.io/robertkrimen/sqlitebrowser:latest
  #   ports:
  #     - "8081:8080"
  #   volumes:
  #     - ./data:/data
  #   depends_on:
  #     - api-template
